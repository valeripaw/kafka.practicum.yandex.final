groups:
  - name: kafka-broker-alerts
    rules:
      - alert: KafkaBrokerDown
        expr: up{job=~"kafka.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kafka broker down"
          description: "Broker {{ $labels.instance }} is down for more than 1 minute."
